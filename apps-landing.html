<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps - Mountain Futures</title>
<link rel="icon" href="https://mountainfutures.ch/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --mf-dark-blue: rgb(39, 46, 63);
    --mf-accent-cyan: rgb(53, 228, 228);
    --mf-light-grey: rgb(230, 238, 246);
    --mf-forrest: rgb(18, 32, 35);
    --mf-evergreen: rgb(26, 44, 48);
    --mf-accent-blue-bg: rgb(185, 255, 255);
    --mf-white: #fff;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--mf-white);
    color: var(--mf-forrest);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Nav */
nav {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 108px;
    padding: 0 32px;
    background: var(--mf-white);
    border-bottom: 1px solid var(--mf-light-grey);
    position: sticky;
    top: 0;
    z-index: 50;
}
nav > * {
    max-width: 1200px;
}
.nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 1200px;
}

nav a.logo img {
    height: 48px;
}

nav .nav-link {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 14px;
    color: var(--mf-forrest);
    text-decoration: none;
    letter-spacing: -0.04em;
    transition: color 0.2s;
}
nav .nav-link:hover {
    color: var(--mf-accent-cyan);
}

/* Hero */
.hero {
    background: var(--mf-dark-blue);
    padding: 80px 20px 64px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('drone-map/contours.jpg') center/cover no-repeat;
    filter: invert(1);
    opacity: 0.12;
    pointer-events: none;
}
.hero > * {
    position: relative;
    z-index: 1;
}
.hero h1 {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(28px, 5vw, 52px);
    color: var(--mf-white);
    letter-spacing: -0.05em;
    line-height: 1em;
    margin-bottom: 16px;
}
.hero p {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    letter-spacing: -0.03em;
    max-width: 480px;
    margin: 0 auto 32px;
    line-height: 1.5;
}

/* Search */
.search-wrap {
    max-width: 400px;
    margin: 0 auto;
    position: relative;
}
.search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.4);
    pointer-events: none;
}
.search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 12px 16px 12px 42px;
    color: var(--mf-white);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.35); }
.search-wrap input:focus { border-color: var(--mf-accent-cyan); }

/* Apps grid */
.apps-section {
    flex: 1;
    padding: 48px 20px 80px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
}

.apps {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}

.app {
    background: var(--mf-white);
    border: 1px solid var(--mf-light-grey);
    border-radius: 12px;
    padding: 28px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: all 0.25s ease;
}
.app:hover {
    border-color: var(--mf-accent-cyan);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(39, 46, 63, 0.1);
}
.app.hidden { display: none; }

.app-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--mf-dark-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
}
.app-icon svg {
    width: 20px;
    height: 20px;
    color: var(--mf-accent-cyan);
}

.app-title {
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    font-size: 17px;
    letter-spacing: -0.04em;
    color: var(--mf-forrest);
}

.app-desc {
    font-size: 13px;
    color: #666;
    line-height: 1.55;
    letter-spacing: -0.02em;
}

.app-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: -0.03em;
    padding: 3px 10px;
    border-radius: 4px;
    width: fit-content;
    margin-top: auto;
}
.tag-map { background: var(--mf-accent-blue-bg); color: var(--mf-evergreen); }
.tag-data { background: #E1FCA0; color: var(--mf-evergreen); }
.tag-forecast { background: var(--mf-accent-blue-bg); color: var(--mf-evergreen); }
.tag-ops { background: var(--mf-light-grey); color: var(--mf-dark-blue); }

.no-results {
    color: #999;
    font-size: 14px;
    text-align: center;
    padding: 48px;
    display: none;
}

/* Footer */
footer {
    background: var(--mf-dark-blue);
    padding: 32px 20px;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: -0.02em;
}
footer a {
    color: var(--mf-accent-cyan);
    text-decoration: none;
}
footer a:hover { text-decoration: underline; }

@media (max-width: 640px) {
    nav { padding: 12px 16px; }
    .hero { padding: 56px 16px 48px; }
    .apps-section { padding: 32px 16px 56px; }
    .apps { grid-template-columns: 1fr; }
}
</style>
</head>

<section class="hero">
    <h1>apps</h1>
    <p>Interactive tools and dashboards for mountain environment research and operational forecasting.</p>
    <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search apps..." autocomplete="off">
    </div>
</section>

<section class="apps-section">
    <div class="apps" id="apps"></div>
    <div class="no-results" id="no-results">No apps match your search.</div>
</section>

<footer>Mountain Futures &middot; <a href="https://mountainfutures.ch">mountainfutures.ch</a></footer>

<script>
const apps = [
    {
        slug: 'ops-dashboard',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
        title: 'Ops Dashboard',
        desc: 'Live status of all operational pipelines. Step-by-step progress, durations, and failure alerts.',
        tag: 'ops', tagLabel: 'Ops'
    },
    {
        slug: 'kaz-forecast',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21l4-10 4 10"/><path d="M2 21l6-16 4 8"/><path d="M14 13l4-8 4 16"/></svg>',
        title: 'Kazakhstan Snow Forecast',
        desc: '10-day operational snow forecast for Kazakhstan. ERA5 + IFS forcing, FSM snow physics, MODIS/station data assimilation.',
        tag: 'forecast', tagLabel: 'Forecast'
    },
    {
        slug: 'snow-explorer',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M20 6l-8 4-8-4"/><path d="M20 18l-8-4-8 4"/><line x1="2" y1="12" x2="22" y2="12"/></svg>',
        title: 'Central Asian Snow Database',
        desc: 'Interactive explorer for snow station data across Central Asia. Time series, maps, and station metadata.',
        tag: 'data', tagLabel: 'Data Explorer'
    },
    {
        slug: 'drone-map',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>',
        title: 'Drone Archive Map',
        desc: 'Leaflet map of all CROMO-ADAPT drone survey missions in Kyrgyzstan. Flight footprints, snow depth probes, and SWE pit data.',
        tag: 'map', tagLabel: 'Map'
    },
    {
        slug: 'benchmark-snow',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 17l4-8 4 4 5-9"/></svg>',
        title: 'benchmarkSnow',
        desc: 'Compare snow model implementations (FSM, fsm-rs, SNOWPACK, snowpack-rs) across datasets. Metrics, performance, and time series.',
        tag: 'data', tagLabel: 'Benchmark'
    }
];

const container = document.getElementById('apps');
const noResults = document.getElementById('no-results');

const appEls = apps.map(app => {
    const a = document.createElement('a');
    a.className = 'app';
    a.href = app.slug + '/';
    a.dataset.search = (app.title + ' ' + app.desc + ' ' + app.tagLabel).toLowerCase();
    a.innerHTML = `
        <div class="app-icon">${app.icon}</div>
        <div class="app-title">${app.title}</div>
        <div class="app-desc">${app.desc}</div>
        <div class="app-tag tag-${app.tag}">${app.tagLabel}</div>
    `;
    container.appendChild(a);
    return a;
});

document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    let visible = 0;
    appEls.forEach(el => {
        const match = !q || el.dataset.search.includes(q);
        el.classList.toggle('hidden', !match);
        if (match) visible++;
    });
    noResults.style.display = visible === 0 ? 'block' : 'none';
});
</script>

</html>
